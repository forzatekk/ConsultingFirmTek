<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>429 — Rate Limit | TEKK Solutions</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/variables.css') }}" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: var(--bg-primary);
      font-family: var(--font-body);
      color: var(--text-primary);
      overflow: hidden;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(ellipse 80% 60% at 50% 0%, rgba(245, 166, 35, 0.05) 0%, transparent 70%),
        linear-gradient(rgba(245, 166, 35, 0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(245, 166, 35, 0.025) 1px, transparent 1px);
      background-size: 100% 100%, 48px 48px, 48px 48px;
      pointer-events: none;
      z-index: 0;
    }

    .error-page {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 560px;
      margin: 0 var(--space-6);
      padding: var(--space-12) var(--space-10);
      border-radius: var(--radius-xl);
      text-align: center;
      border: 1px solid rgba(245, 166, 35, 0.3);
      box-shadow:
        0 0 0 1px rgba(245, 166, 35, 0.15),
        0 0 20px rgba(245, 166, 35, 0.12),
        inset 0 0 16px rgba(245, 166, 35, 0.03),
        0 20px 50px rgba(0, 0, 0, 0.7);
    }

    .error-code {
      font-family:    var(--font-heading);
      font-size:      clamp(6rem, 20vw, 9rem);
      font-weight:    var(--weight-black);
      line-height:    1;
      color:          var(--color-warning);
      text-shadow:
        0 0 20px rgba(245, 166, 35, 0.5),
        0 0 60px rgba(245, 166, 35, 0.2),
        0 0 120px rgba(245, 166, 35, 0.08);
      letter-spacing: var(--tracking-tight);
      margin-bottom:  var(--space-2);
    }

    @keyframes warningPulse {
      0%, 100% { text-shadow: 0 0 20px rgba(245,166,35,.5), 0 0 60px rgba(245,166,35,.2); }
      50%       { text-shadow: 0 0 40px rgba(245,166,35,.8), 0 0 100px rgba(245,166,35,.3); }
    }
    .error-code { animation: warningPulse 3s ease-in-out infinite; }

    .error-title {
      font-family:    var(--font-heading);
      font-size:      var(--text-2xl);
      font-weight:    var(--weight-bold);
      letter-spacing: var(--tracking-wide);
      color:          var(--color-warning);
      margin-bottom:  var(--space-4);
    }

    .error-body {
      font-size:      var(--text-base);
      line-height:    var(--leading-relaxed);
      color:          var(--text-secondary);
      margin-bottom:  var(--space-8);
    }

    .cooldown-strip {
      display:         flex;
      align-items:     center;
      justify-content: center;
      gap:             var(--space-3);
      padding:         var(--space-3) var(--space-5);
      border-radius:   var(--radius-md);
      background:      rgba(245, 166, 35, 0.07);
      border:          1px solid rgba(245, 166, 35, 0.2);
      font-family:     var(--font-mono);
      font-size:       var(--text-xs);
      color:           var(--color-warning);
      letter-spacing:  var(--tracking-wider);
      text-transform:  uppercase;
      margin-bottom:   var(--space-8);
    }

    .cyber-divider {
      margin:     0 auto var(--space-8);
      max-width:  240px;
      height:     1px;
      background: linear-gradient(
        90deg,
        transparent 0%,
        rgba(245, 166, 35, 0.4) 30%,
        rgba(245, 166, 35, 0.7) 50%,
        rgba(245, 166, 35, 0.4) 70%,
        transparent 100%
      );
    }

    .actions {
      display:         flex;
      gap:             var(--space-4);
      justify-content: center;
      flex-wrap:       wrap;
    }

    .btn {
      display:         inline-flex;
      align-items:     center;
      gap:             var(--space-2);
      padding:         var(--space-3) var(--space-6);
      border-radius:   var(--radius-md);
      font-family:     var(--font-heading);
      font-size:       var(--text-sm);
      font-weight:     var(--weight-semibold);
      letter-spacing:  var(--tracking-wider);
      text-transform:  uppercase;
      text-decoration: none;
      transition:      var(--transition-base);
    }

    .btn-primary {
      background: var(--accent-cyan);
      color:      var(--bg-primary);
    }
    .btn-primary:hover {
      background:  #33f5ff;
      box-shadow:  0 0 24px var(--accent-glow), 0 0 48px rgba(0, 242, 255, 0.15);
      transform:   translateY(-2px);
    }
  </style>
</head>
<body class="scanlines">

  <article class="error-page glass">

    <p class="badge-label" style="justify-content: center; margin-bottom: var(--space-6); color: var(--color-warning);">
      // LIMIT.429
    </p>

    <h1 class="error-code">429</h1>

    <h2 class="error-title">Too Many Requests</h2>

    <p class="error-body">
      You've sent too many requests in a short window.<br>
      Please slow down and try again in a moment.
    </p>

    <div class="cooldown-strip">
      &#9650;&nbsp; throttle active
      {% if retry_after %}
        &nbsp;·&nbsp; retry in {{ retry_after }}s
      {% endif %}
    </div>

    <div class="cyber-divider"></div>

    <nav class="actions" aria-label="Recovery options">
      <a href="{{ url_for('views.index') }}" class="btn btn-primary">Return Home</a>
    </nav>

  </article>

</body>
</html>
