<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Signal Lost | TEKK Solutions</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/variables.css') }}" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: var(--bg-primary);
      font-family: var(--font-body);
      color: var(--text-primary);
      overflow: hidden;
      position: relative;
    }

    /* Radial grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(ellipse 80% 60% at 50% 0%, rgba(0, 242, 255, 0.06) 0%, transparent 70%),
        linear-gradient(rgba(0, 242, 255, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 242, 255, 0.03) 1px, transparent 1px);
      background-size: 100% 100%, 48px 48px, 48px 48px;
      pointer-events: none;
      z-index: 0;
    }

    .error-page {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 560px;
      margin: 0 var(--space-6);
      padding: var(--space-12) var(--space-10);
      border-radius: var(--radius-xl);
      text-align: center;
    }

    .error-code {
      font-family: var(--font-heading);
      font-size: clamp(6rem, 20vw, 9rem);
      font-weight: var(--weight-black);
      line-height: 1;
      color: var(--accent-cyan);
      text-shadow:
        0 0 20px var(--accent-glow),
        0 0 60px rgba(0, 242, 255, 0.15),
        0 0 120px rgba(0, 242, 255, 0.06);
      letter-spacing: var(--tracking-tight);
      margin-bottom: var(--space-2);
    }

    /* Glitch flicker on the code */
    @keyframes flicker {
      0%, 95%, 100% { opacity: 1; }
      96% { opacity: 0.6; }
      97% { opacity: 1; }
      98% { opacity: 0.4; }
      99% { opacity: 0.9; }
    }
    .error-code { animation: flicker 6s ease-in-out infinite; }

    .error-title {
      font-family: var(--font-heading);
      font-size: var(--text-2xl);
      font-weight: var(--weight-bold);
      letter-spacing: var(--tracking-wide);
      margin-bottom: var(--space-4);
    }

    .error-body {
      font-size: var(--text-base);
      line-height: var(--leading-relaxed);
      color: var(--text-secondary);
      margin-bottom: var(--space-8);
    }

    .error-body code {
      font-family: var(--font-mono);
      font-size: var(--text-sm);
      color: var(--accent-cyan);
      background: rgba(0, 242, 255, 0.08);
      padding: 0.1em 0.4em;
      border-radius: var(--radius-sm);
    }

    .cyber-divider {
      margin: var(--space-8) auto;
      max-width: 240px;
    }

    .actions {
      display: flex;
      gap: var(--space-4);
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: var(--space-2);
      padding: var(--space-3) var(--space-6);
      border-radius: var(--radius-md);
      font-family: var(--font-heading);
      font-size: var(--text-sm);
      font-weight: var(--weight-semibold);
      letter-spacing: var(--tracking-wider);
      text-transform: uppercase;
      text-decoration: none;
      transition: var(--transition-base);
      cursor: pointer;
    }

    .btn-primary {
      background: var(--accent-cyan);
      color: var(--bg-primary);
    }
    .btn-primary:hover {
      background: #33f5ff;
      box-shadow: 0 0 24px var(--accent-glow), 0 0 48px rgba(0, 242, 255, 0.15);
      transform: translateY(-2px);
    }

    .btn-ghost {
      color: var(--accent-cyan);
      border: 1px solid var(--border-accent);
    }
    .btn-ghost:hover {
      border-color: var(--border-glow);
      background: var(--accent-glow-soft);
      box-shadow: 0 0 16px var(--accent-glow);
    }
  </style>
</head>
<body class="scanlines">

  <article class="error-page glass neon-border">

    <p class="badge-label" style="justify-content: center; margin-bottom: var(--space-6);">
      // ERROR.404
    </p>

    <h1 class="error-code">404</h1>

    <h2 class="error-title text-gradient-bright">Signal Lost</h2>

    <p class="error-body">
      The route <code>{{ request.path }}</code> doesn't exist or has been moved.<br>
      Check the URL or navigate back to a known location.
    </p>

    <div class="cyber-divider"></div>

    <nav class="actions" aria-label="Recovery options">
      <a href="{{ url_for('views.index') }}" class="btn btn-primary">Return Home</a>
      <a href="{{ url_for('views.contact') }}" class="btn btn-ghost">Contact Support</a>
    </nav>

  </article>

</body>
</html>
